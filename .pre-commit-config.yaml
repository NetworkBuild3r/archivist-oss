repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        # Informational only — pre-existing errors do not block commits.
        # The CI ratchet gate (ceiling=90) is the hard enforcement point.
        # Move back to stage: commit once the error count reaches 0.
        additional_dependencies: []
        args: [--config-file=pyproject.toml, --no-error-summary]
        files: ^src/archivist/
        stages: [manual]   # run manually: pre-commit run mypy --hook-stage manual
