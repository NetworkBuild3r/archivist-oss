version: 2
updates:
  # Python dependencies — weekly PRs for security patches + upgrades
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    groups:
      # Bundle all test deps into one PR
      test-deps:
        patterns: ["pytest*", "coverage*", "mypy*", "ruff*", "bandit*"]

  # GitHub Actions — keep action versions current (security + Node compat)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
