# ─────────────────────────────────────────────────────────────────────────────
# Archivist CI — runs on every push / PR to main
#
# Jobs (all run in parallel after checkout):
#   lint       → Ruff (format + lint) — fastest gate, blocks everything else
#   typecheck  → mypy strict on src/archivist/
#   test       → pytest unit suite on Python 3.12 + 3.13 with coverage
#   security   → Bandit + Trivy filesystem scan
#   docker     → Build the production image and smoke-test /health
#
# Integration tests (Qdrant service container) run only on push to main or
# when a PR targets main, to avoid burning minutes on every draft commit.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, master, "feature/**", "fix/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — jobs that need more request them explicitly.
permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ─── Lint ────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Format (Ruff)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Ruff
        run: uv tool install ruff

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

# ─── Type check ──────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt mypy types-PyYAML

      - name: mypy (informational — pre-existing errors do not block CI)
        # The codebase has ~90 pre-existing mypy errors inherited before this
        # pipeline was introduced.  We run mypy so annotations appear in the PR
        # diff view but we do NOT fail the job.  Remove `|| true` once the
        # error count reaches zero.
        run: python -m mypy src/archivist/ --config-file pyproject.toml || true

# ─── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt
          pip install pytest-cov coverage[toml]

      - name: Run unit tests (no external services)
        run: |
          python -m pytest tests/ -v --tb=short \
            -m "not integration" \
            --cov=src/archivist \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-branch \
            -q
        env:
          SQLITE_PATH: ":memory:"
          QDRANT_URL: ""

      - name: Upload coverage to GitHub summary
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

# ─── Integration Tests ───────────────────────────────────────────────────────
  integration:
    name: Integration Tests (Qdrant)
    runs-on: ubuntu-24.04
    # Only run on pushes to main/master or PRs targeting those branches
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.base_ref == 'main' || github.base_ref == 'master'))

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334
        # No health-cmd here — the Qdrant image is minimal and has no curl/wget.
        # Readiness is checked from the runner in the "Wait for Qdrant" step below.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Wait for Qdrant
        run: |
          until curl -sf http://localhost:6333/readyz; do
            echo "Waiting for Qdrant…"
            sleep 2
          done

      - name: Run integration tests
        run: |
          python -m pytest tests/ -v --tb=short \
            -m "integration" \
            --timeout=120
        env:
          QDRANT_URL: "http://localhost:6333"
          SQLITE_PATH: "/tmp/archivist-test.db"

# ─── Security ────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Bandit SAST scan
        run: |
          bandit -r src/ \
            -ll \
            --exclude src/archivist/app/main.py \
            -f json \
            -o bandit-results.json || true
          bandit -r src/ -ll --exclude src/archivist/app/main.py

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

# ─── Docker Build + Smoke Test ───────────────────────────────────────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-24.04
    # Run in parallel with lint/test — gives build signal independently.
    # Requires only checkout; no dependency on other jobs.
    permissions:
      contents: read
      packages: write   # needed for the edge-push step on main

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io (push steps only)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (linux/amd64 only for CI speed)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: archivist:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — package imports
        run: |
          docker run --rm archivist:ci-${{ github.sha }} \
            python -c "
          import sys
          sys.path.insert(0, '/app')
          import archivist
          print(f'archivist {archivist.__version__} OK')
          from archivist.core import config
          from archivist.storage import qdrant
          from archivist.lifecycle import cascade
          print('core imports OK')
          "

      - name: Smoke test — /health endpoint
        run: |
          docker run -d --name archivist-smoke \
            -p 3100:3100 \
            -e QDRANT_URL=http://127.0.0.1:6333 \
            -e LLM_URL=http://127.0.0.1:11434 \
            -e EMBED_URL=http://127.0.0.1:8000 \
            -e LLM_MODEL=test \
            -e EMBED_MODEL=test \
            archivist:ci-${{ github.sha }} || true

          echo "Waiting for server to start..."
          sleep 12

          curl -sf --retry 5 --retry-delay 2 http://localhost:3100/health \
            && echo "Health OK" \
            || echo "Health endpoint not available (expected without Qdrant/LLM backends)"

          docker logs archivist-smoke 2>&1 | tail -20 || true
          docker rm -f archivist-smoke || true

      # Push edge image to ghcr.io on every merge to main (not on PRs).
      # This gives you a always-fresh image to deploy from without waiting for a tag release.
      - name: Push edge image to ghcr.io
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:edge
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
