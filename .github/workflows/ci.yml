# ─────────────────────────────────────────────────────────────────────────────
# Archivist CI
#
# Jobs (parallel unless noted):
#   pre-commit  → enforce local hooks — catches --no-verify bypasses
#   lint        → Ruff format + lint
#   typecheck   → mypy error-count ratchet (cannot increase above baseline)
#   test        → unit + regression — no I/O, runs on every push (3.12 + 3.13)
#   integration → integration + system — SQLite + mocked Qdrant (PRs to main)
#   chaos       → fault injection / adversarial (PRs to main)
#   performance → timing regression gates (main pushes only — isolated runner)
#   security    → pip-audit (CVE) + Bandit (SAST) + Trivy (filesystem)
#   docker      → build + smoke test; edge push on main merge
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, master, "feature/**", "fix/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ─── Pre-commit ───────────────────────────────────────────────────────────────
jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: pre-commit/action@v3.0.1

# ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format (Ruff)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Ruff
        run: uv tool install ruff

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

# ─── Type check (ratchet — error count may only decrease) ────────────────────
  typecheck:
    name: Type Check (mypy ratchet ≤ 90 errors)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt mypy types-PyYAML types-tqdm

      - name: mypy — ratchet gate (count may not increase above baseline)
        # Only real type errors count — import-not-found / import-untyped are
        # excluded because they vary by environment.
        # Baseline: 90 real type errors measured locally (qdrant-client 1.17.1).
        # grep is anchored to ^src/archivist/ to avoid matching note: lines
        # that quote type names containing the word "error".
        # TODO: once CI count is stable, remove continue-on-error and set
        #       MYPY_MAX_ERRORS to 5 above that value.
        continue-on-error: true
        env:
          MYPY_MAX_ERRORS: "120"
        run: |
          OUTPUT=$(python -m mypy src/archivist/ --config-file pyproject.toml 2>&1)
          echo "$OUTPUT"
          COUNT=$(echo "$OUTPUT" | grep "^src/archivist/.*: error:" | grep -v "\[import-not-found\]\|\[import-untyped\]" | wc -l || true)
          echo ""
          echo "::notice::mypy type errors (real, excl. import stubs): $COUNT / ceiling: $MYPY_MAX_ERRORS"
          if [ "$COUNT" -gt "$MYPY_MAX_ERRORS" ]; then
            echo "::error::mypy error count ($COUNT) exceeds ratchet ceiling ($MYPY_MAX_ERRORS). Fix errors before merging."
            exit 1
          fi
          echo "mypy ratchet OK: $COUNT ≤ $MYPY_MAX_ERRORS"

# ─── Unit + Regression Tests ─────────────────────────────────────────────────
  test:
    name: Unit & Regression Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt
          pip install pytest-cov coverage[toml]

      - name: Run unit + regression tests
        # unit: pure logic — no I/O, no SQLite, no Qdrant — fastest feedback loop
        # regression: specific bug guards — also no external services
        # --cov-fail-under=0: overrides pyproject.toml fail_under (46%) which is
        # calibrated for the full suite; unit+regression alone cover ~24% by design.
        run: |
          python -m pytest \
            tests/unit/ tests/regression/ \
            -m "unit or regression" \
            --tb=short \
            --junitxml=test-results-${{ matrix.python-version }}.xml \
            --cov=src/archivist \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=term-missing \
            --cov-branch \
            --cov-fail-under=0 \
            -q
        env:
          SQLITE_PATH: ":memory:"
          QDRANT_URL: ""

      - name: Upload test results (PR annotations)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml
          retention-days: 14

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-3.12.xml
          retention-days: 14

# ─── Integration + System Tests ──────────────────────────────────────────────
  integration:
    name: Integration & System Tests
    runs-on: ubuntu-24.04
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.base_ref == 'main' || github.base_ref == 'master'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt pytest-timeout

      - name: Run integration + system tests
        # integration: real SQLite, mocked Qdrant — lifecycle/storage/retrieval/MCP handlers
        # system: full MCP handler smoke + RBAC — also mocked Qdrant (no service container needed)
        run: |
          python -m pytest \
            tests/integration/ tests/system/ \
            -m "integration or system" \
            --tb=short \
            --timeout=120 \
            --junitxml=test-results-integration.xml \
            -q
        env:
          SQLITE_PATH: "/tmp/archivist-test.db"
          QDRANT_URL: ""

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: test-results-integration.xml
          retention-days: 14

# ─── Chaos Tests ─────────────────────────────────────────────────────────────
  chaos:
    name: Chaos & Fault-Injection Tests
    runs-on: ubuntu-24.04
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.base_ref == 'main' || github.base_ref == 'master'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt pytest-timeout

      - name: Run chaos tests
        # Fault injection, concurrent writers, write-lock contracts, crash recovery.
        # Isolated job so timing noise from other jobs does not affect these.
        run: |
          python -m pytest \
            tests/chaos/ \
            -m "chaos" \
            --tb=short \
            --timeout=120 \
            --junitxml=test-results-chaos.xml \
            -q
        env:
          SQLITE_PATH: "/tmp/archivist-chaos.db"
          QDRANT_URL: ""

      - name: Upload chaos test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-chaos
          path: test-results-chaos.xml
          retention-days: 14

# ─── Performance Regression Tests ────────────────────────────────────────────
  performance:
    name: Performance Regression Tests
    runs-on: ubuntu-24.04
    # Run on all pushes to main — never on PRs (timing is noisy on shared runners).
    # If you need to investigate a perf regression on a branch, run locally:
    #   pytest tests/performance/ -m performance -v -s
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt pytest-timeout

      - name: Run performance regression tests
        # Timing gates: transaction open/close <50ms, outbox drain 50 events <500ms, etc.
        # Runs on a dedicated job with no concurrent workload to minimise timer noise.
        run: |
          python -m pytest \
            tests/performance/ \
            -m "performance" \
            --tb=short \
            --timeout=60 \
            --junitxml=test-results-performance.xml \
            -v -s
        env:
          SQLITE_PATH: "/tmp/archivist-perf.db"
          QDRANT_URL: ""

      - name: Upload performance test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-performance
          path: test-results-performance.xml
          retention-days: 30

# ─── Security ────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependency CVE scan (pip-audit)
        # Scans requirements.txt against OSV/PyPI advisory DB.
        # Catches known CVEs before the image is built (complements Trivy).
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt -r requirements-test.txt \
            --output pip-audit-results.json --format json || true
          pip-audit -r requirements.txt -r requirements-test.txt

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Bandit SAST scan
        run: |
          bandit -r src/ -ll -c pyproject.toml \
            -f json -o bandit-results.json || true
          bandit -r src/ -ll -c pyproject.toml

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif

# ─── Docker Build + Smoke Test ───────────────────────────────────────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io (push steps only)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (linux/amd64 only for CI speed)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: archivist:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — package imports
        run: |
          docker run --rm archivist:ci-${{ github.sha }} \
            python -c "
          import sys
          sys.path.insert(0, '/app')
          import archivist
          print(f'archivist {archivist.__version__} OK')
          from archivist.core import config
          from archivist.storage import qdrant
          from archivist.lifecycle import cascade
          print('core imports OK')
          "

      - name: Smoke test — /health endpoint
        run: |
          docker run -d --name archivist-smoke \
            -p 3100:3100 \
            -e QDRANT_URL=http://127.0.0.1:6333 \
            -e LLM_URL=http://127.0.0.1:11434 \
            -e EMBED_URL=http://127.0.0.1:8000 \
            -e LLM_MODEL=test \
            -e EMBED_MODEL=test \
            archivist:ci-${{ github.sha }} || true

          echo "Waiting for server to start..."
          sleep 12

          curl -sf --retry 5 --retry-delay 2 http://localhost:3100/health \
            && echo "Health OK" \
            || echo "Health endpoint not available (expected without Qdrant/LLM backends)"

          docker logs archivist-smoke 2>&1 | tail -20 || true
          docker rm -f archivist-smoke || true

      - name: Derive lowercase image name
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: echo "IMAGE_REPO=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Push edge image to ghcr.io
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:edge
            ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
