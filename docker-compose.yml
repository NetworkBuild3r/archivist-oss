# Archivist dev / single-node deployment
#
#   cp .env.example .env   # edit LLM / EMBED / keys
#   docker compose up -d --build
#   curl http://localhost:3100/health
#
# LLM / embedding: any OpenAI-compatible endpoint set via .env
#   Ollama (local):  LLM_URL=http://host.docker.internal:11434
#   vLLM (host):     LLM_URL=http://host.docker.internal:8000
#   Cloud API:       LLM_URL=https://api.openai.com
#
# Benchmark in Docker (Qdrant + archivist network):
#   docker compose up -d qdrant
#   docker compose --profile benchmark build benchmark
#   docker compose --profile benchmark run --rm benchmark --no-refine --output .benchmarks/pipeline.json
#
# Academic suite (LongMemEval / LoCoMo / HaluMem):
#   bash benchmarks/scripts/run_academic_benchmarks_docker.sh
# LongMemEval only — timestamped JSON under .benchmarks/runs/ + longmemeval_latest symlink:
#   bash benchmarks/scripts/run_longmemeval_docker.sh
# Do not commit .env (gitignored); use .env.example as the template only.
#
# Data under Docker volumes by default; use docker-compose.override.example.yml to bind host paths.

name: archivist

services:
  # Pipeline benchmark: Qdrant on archivist-net, repo bind-mount.
  benchmark:
    profiles: ["benchmark"]
    build:
      context: .
      dockerfile: Dockerfile.benchmark
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      # LLM and embedding: containers reach host services via host.docker.internal.
      # Set BENCHMARK_EMBED_URL / BENCHMARK_LLM_URL in .env to override per-run.
      EMBED_URL: ${BENCHMARK_EMBED_URL:-http://host.docker.internal:8000}
      EMBED_API_KEY: ${EMBED_API_KEY:-}
      EMBED_MODEL: ${BENCHMARK_EMBED_MODEL:-${EMBED_MODEL:-bge-base}}
      VECTOR_DIM: ${VECTOR_DIM:-768}
      LLM_URL: ${BENCHMARK_LLM_URL:-${LLM_URL:-http://host.docker.internal:11434}}
      LLM_MODEL: ${BENCHMARK_LLM_MODEL:-${LLM_MODEL:-llama3.1}}
      LLM_API_KEY: ${LLM_API_KEY:-}
      # Curator LLM override — falls back to LLM_URL/LLM_MODEL when empty.
      # Set BENCHMARK_CURATOR_LLM_URL / BENCHMARK_CURATOR_LLM_MODEL in .env to use a
      # separate model for entity extraction, dedup, and compaction during benchmarks.
      CURATOR_LLM_URL: ${BENCHMARK_CURATOR_LLM_URL:-${CURATOR_LLM_URL:-}}
      CURATOR_LLM_MODEL: ${BENCHMARK_CURATOR_LLM_MODEL:-${CURATOR_LLM_MODEL:-}}
      CURATOR_LLM_API_KEY: ${CURATOR_LLM_API_KEY:-}
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
    volumes:
      - .:/workspace
    working_dir: /workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    networks:
      - archivist-net

  archivist:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Qdrant accessible via shared network
      QDRANT_URL: http://qdrant:6333
      # Paths inside the container
      SQLITE_PATH: /data/archivist/graph.db
      MEMORY_ROOT: /data/memories
      NAMESPACES_CONFIG_PATH: /data/archivist/config/namespaces.yaml
      # LLM / embedding: configure in .env (any OpenAI-compatible endpoint).
      # Examples: Ollama on host → http://host.docker.internal:11434
      #           vLLM on host  → http://host.docker.internal:8000
      #           Cloud API     → https://api.openai.com
      LLM_URL: ${LLM_URL:-http://host.docker.internal:11434}
      LLM_MODEL: ${LLM_MODEL:-llama3.1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      # Curator LLM override (optional): dedicated model for entity extraction, dedup,
      # compaction. Falls back to LLM_URL / LLM_MODEL when empty.
      CURATOR_LLM_URL: ${CURATOR_LLM_URL:-}
      CURATOR_LLM_MODEL: ${CURATOR_LLM_MODEL:-}
      CURATOR_LLM_API_KEY: ${CURATOR_LLM_API_KEY:-}
      EMBED_URL: ${EMBED_URL:-http://host.docker.internal:8000}
      EMBED_API_KEY: ${EMBED_API_KEY:-}
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-base-en-v1.5}
      VECTOR_DIM: ${VECTOR_DIM:-768}
      MCP_PORT: ${MCP_PORT:-3100}
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      RETRIEVAL_THRESHOLD: ${RETRIEVAL_THRESHOLD:-0.65}
    volumes:
      - archivist-data:/data
      - archivist-backups:/data/archivist/backups
      - ${MEMORY_DIR:-./sample-memories}:/data/memories:ro
    ports:
      - "${MCP_PORT:-3100}:3100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    networks:
      - archivist-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - archivist-net
    restart: unless-stopped

volumes:
  archivist-data:
  archivist-backups:
  qdrant-storage:

networks:
  archivist-net:
    driver: bridge
