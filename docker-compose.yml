# Archivist dev / single-node deployment
#
#   cp .env.example .env   # edit LLM / EMBED / keys
#   docker compose up -d --build
#   curl http://localhost:3100/health
#
# Embeddings on the host (e.g. vLLM :8000) from inside the archivist container:
#   EMBED_URL=http://host.docker.internal:8000
# Cloud LLM (e.g. xAI):
#   LLM_URL=https://api.x.ai
# (Do not put /v1 on LLM_URL — the app adds /v1/chat/completions.)
#
# Data under Docker volumes by default; use docker-compose.override.example.yml to bind /opt/appdata.

name: archivist

services:
  archivist:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${MCP_PORT:-3100}:3100"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Qdrant is always the compose service name (not localhost)
      QDRANT_URL: http://qdrant:6333
      # Paths inside the container
      SQLITE_PATH: /data/archivist/graph.db
      MEMORY_ROOT: /data/memories
      NAMESPACES_CONFIG_PATH: /data/archivist/config/namespaces.yaml
      # From .env (defaults for local dev without .env)
      LLM_URL: ${LLM_URL:-http://host.docker.internal:11434}
      LLM_MODEL: ${LLM_MODEL:-llama3.1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBED_URL: ${EMBED_URL:-http://host.docker.internal:8000}
      EMBED_API_KEY: ${EMBED_API_KEY:-}
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-base-en-v1.5}
      VECTOR_DIM: ${VECTOR_DIM:-768}
      MCP_PORT: ${MCP_PORT:-3100}
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      RETRIEVAL_THRESHOLD: ${RETRIEVAL_THRESHOLD:-0.65}
    volumes:
      - archivist-data:/data
      - ${MEMORY_DIR:-./sample-memories}:/data/memories:ro
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    # No healthcheck: the official image has no curl/wget; bash/TCP probes fail on some hosts.
    # Archivist retries Qdrant for up to 120s on startup (see ensure_qdrant_collection in main.py).
    restart: unless-stopped

volumes:
  archivist-data:
  qdrant-storage:
