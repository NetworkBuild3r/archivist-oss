[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = ["test_*.py", "bench_*.py"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks integration tests requiring external services",
    "benchmark: marks performance benchmarks (run with 'pytest benchmarks/')",
]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "T20", # flake8-print (no bare print in library code)
    "RUF", # Ruff-specific rules
    "SIM", # flake8-simplify
    "PIE", # flake8-pie
    "Q",   # flake8-quotes
]
ignore = [
    "S101",   # assert used — fine in tests
    "S603",   # subprocess without shell=True — not a risk in our context
    "S607",   # partial executable path — same
    "T201",   # print — allowed in CLI / benchmark entry points
    "B008",   # function calls in defaults — common FastAPI pattern
    "RUF012", # mutable class vars — dataclass fields
]
unfixable = ["F841"]  # local variable assigned but never used — must be fixed manually

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S106", "T201", "S105"]
"benchmarks/**" = ["T201", "S101"]
"src/archivist/app/main.py" = ["T201"]

[tool.ruff.lint.isort]
known-first-party = ["archivist"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.11"
mypy_path = "src"
explicit_package_bases = true

# Suppress errors for third-party packages with no stubs
[[tool.mypy.overrides]]
module = ["xgboost", "xgboost.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["yaml"]
ignore_missing_imports = true

[tool.coverage.run]
branch = true
source = ["src/archivist"]
omit = ["tests/*", "benchmarks/*", "src/*/__init__.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 1
fail_under = 0  # raise once baseline is established

[tool.pytest-benchmark]
disable_gc = true
warmup = true
min_rounds = 5
